<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Intramurals | Sign Up</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        :root { --gold: #FFD700; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.3); }
        nav { width: 100%; background: rgba(0,0,0,0.9); padding: 15px 40px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .nav-title { font-weight: 800; color: var(--gold); letter-spacing: 1px; }
        .nav-links a { color: white; text-decoration: none; margin-left: 25px; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }
        .card { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(10px); padding: 40px; border-radius: 8px; border-top: 5px solid var(--gold); width: 350px; margin-top: 80px; text-align: center; box-shadow: 0 20px 40px black; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--gold); border: none; font-weight: 900; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        #success-card { display:none}
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video"><source src="background.mp4" type="video/mp4"></video>
    <nav>
        <div class="nav-title">Intramurals SY 2025-2026</div>
    </nav>
    <div class="card">
        <h2 style="color: var(--gold); letter-spacing: 2px;">CREATE ACCOUNT</h2>
        <input type="text" id="user_input" placeholder="Username (Min. 7)" autocomplete="off">
        <input type="password" id="pass_input" placeholder="Password (Min. 10)">
        <button py-click="verify_account">REGISTER</button>
        <div id="feedback-log" style="margin-top:20px;"></div>
    </div>

    <div class="card" id="success-card">
        <p>Congratulations on signing up! Here are more tools for your Intrams!</p>
        <a href="teams.html"><button>Team Checker</button></a>
        <a href="players.html"><button>Roster</button></a>
    </div><br>

    <py-config>
        [[fetch]]
        files = ["main.py"]
    </py-config>
    <script type="py" src="main.py"></script>
</body>

</html>
